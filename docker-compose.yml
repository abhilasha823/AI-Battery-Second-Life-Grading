services:
  backend:
    build:
      context: ./backend
    container_name: ev_battery_api
    environment:
      DATABASE_URL: sqlite:///./soh.db
      FRONTEND_ORIGIN: http://localhost:5173
    ports:
      - "8000:8000"

  frontend:
    build:
      context: ./frontend
    container_name: ev_battery_web
    environment:
      VITE_API_BASE_URL: http://localhost:8000
    ports:
      - "5173:5173"
    depends_on:
      - backend
